server_names_hash_bucket_size 128;

server {
    listen 80;
    root /var/www/lsrelay;
    access_log /var/log/nginx/access.log;
    location /ca.crt {
        root /etc/ssl/lsrelay;
        add_header Content-Type application/x-x509-ca-cert;
    }
    location /setup {
        try_files /setup/index.html =404;
    }
    location / { return 302 https://lsrelay-config-production.s3.amazonaws.com/prewarm; }




    error_page 404 = @empty;
    location @empty {
        add_header Content-Type application/json;
        return 200 '{}';
    }
}
server {
    listen 443 ssl;
    server_name lsrelay-config-production.s3.amazonaws.com lsrelay-extensions-production.s3.amazonaws.com lsrelay-reports-production.s3.amazonaws.com;
    ssl_certificate /etc/ssl/lsrelay/server.crt;
    ssl_certificate_key /etc/ssl/lsrelay/server.key;
    access_log /var/log/nginx/lsrelay_access.log;
    root /var/www/lsrelay;
    location /setup {
        try_files /setup/index.html =404;
    }

    location /prewarm {
        try_files /prewarm/index.html =404;
    }
    location /prewarm-api/ {
        proxy_pass http://127.0.0.1:8446;
    }
    location / { try_files  / =404; default_type application/json; }
    error_page 404 = @empty;
    location @empty { add_header Content-Type application/json; return 200 '{}'; }
}
server {
    listen 443 ssl;
    server_name agent-backend-api-production.lightspeedsystems.com lightspeedsystems.com www.lightspeedsystems.com;
    ssl_certificate /etc/ssl/lsrelay/server.crt;
    ssl_certificate_key /etc/ssl/lsrelay/server.key;
    access_log /var/log/nginx/lsrelay_access.log;
    location / { add_header Content-Type application/json; return 200 '{}'; }
}
server {
    listen 443 ssl;
    listen 80;
    server_name lsrelayaccess.com ably.lightspeedsystems.app lightspeed-realtime.ably.io a-fallback-lightspeed.ably.io b-fallback-lightspeed.ably.io c-fallback-lightspeed.ably.io;
    ssl_certificate /etc/ssl/lsrelay/server.crt;
    ssl_certificate_key /etc/ssl/lsrelay/server.key;
    access_log /var/log/nginx/lsrelay_access.log;
    location / { add_header Content-Type text/plain; return 204; }
}
server {
    listen 443 ssl;
    server_name production-gc.lsfilter.com lsfilter.com;
    ssl_certificate /etc/ssl/lsrelay/server.crt;
    ssl_certificate_key /etc/ssl/lsrelay/server.key;
    access_log /var/log/nginx/lsrelay_access.log;
    location / {
        proxy_pass http://127.0.0.1:8444;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
server {
    listen 443 ssl;
    server_name devices.filter.relay.school devices.classroom.relay.school filter.relay.school relay.school;
    ssl_certificate /etc/ssl/lsrelay/server.crt;
    ssl_certificate_key /etc/ssl/lsrelay/server.key;
    access_log /var/log/nginx/lsrelay_access.log;
    location /filter/chrome/v2/user_policy {
        proxy_pass http://127.0.0.1:8446;
        proxy_set_header Host $host;
    }
    location /phrases {
        add_header Content-Type application/json;
        return 200 '[]';
    }
    location / {
        add_header Content-Type application/json;
        return 200 '{}';
    }
}
